config system interface
  edit "port1"
    set ip 192.0.2.1 255.255.255.0
  next
end
config system zone
  edit "trust"
    set interface "port1"
  next
end
config firewall address
  edit "srv1"
    set subnet 10.10.10.10 255.255.255.255
  next
end
config firewall addrgrp
  edit "srv-group"
    set member "srv1"
  next
end
config firewall service custom
  edit "HTTPS"
    set tcp-portrange 443
  next
end
config firewall policy
  edit 1
    set name "Allow-Web"
    set srcintf "trust"
    set dstintf "wan1"
    set srcaddr "srv-group"
    set dstaddr "all"
    set service "HTTPS"
    set action accept
    set nat enable
  next
end
config router static
  edit 1
    set dst 0.0.0.0 0.0.0.0
    set gateway 198.51.100.1
    set device "port1"
  next
end
